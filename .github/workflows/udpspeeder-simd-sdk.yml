name: udpspeeder-simd SDK build

# Our own validation lane (call/0000 milestone task #ci-sdk-lane). It lives in the host
# repo, never in the openwrt/packages PR, so the PR stays a discrete package addition.
# It builds the udpspeeder-simd package from the fork's PR branch against the current
# OpenWrt snapshot SDK, for x86_64 and for ath79/generic (the MIPS 24Kc target the issue
# names). After the PR merges and the branch is deleted, point PKG_BRANCH at the merged
# location.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - .github/workflows/udpspeeder-simd-sdk.yml

permissions:
  contents: read

env:
  PKG_REPO: https://github.com/connollydavid/packages.git
  PKG_BRANCH: udpspeeder-simd

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86/64, ath79/generic]
    name: ${{ matrix.target }}
    steps:
      - name: Install build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gettext git libncurses-dev libssl-dev python3 python3-setuptools \
            rsync swig unzip zlib1g-dev file wget zstd

      - name: Fetch the udpspeeder-simd package from the fork branch
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            -b "$PKG_BRANCH" "$PKG_REPO" feed
          git -C feed sparse-checkout set net/udpspeeder-simd

      - name: Download the current snapshot SDK for ${{ matrix.target }}
        run: |
          base="https://downloads.openwrt.org/snapshots/targets/${{ matrix.target }}"
          sdk=$(wget -qO- "$base/sha256sums" | grep -oE 'openwrt-sdk[^*]+\.tar\.zst' | head -1)
          echo "SDK: $sdk"
          wget -qO sdk.tar.zst "$base/$sdk"
          mkdir sdk && tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: Build udpspeeder-simd
        run: |
          mkdir -p localfeed/net
          cp -r feed/net/udpspeeder-simd localfeed/net/
          cd sdk
          cp feeds.conf.default feeds.conf
          echo "src-link udpspeedersimd $GITHUB_WORKSPACE/localfeed" >> feeds.conf
          ./scripts/feeds update udpspeedersimd
          ./scripts/feeds install udpspeeder-simd
          make defconfig
          make package/udpspeeder-simd/compile V=s

      - name: Confirm the package artifact exists
        run: |
          find sdk/bin -name 'udpspeeder-simd*' -print | tee found.txt
          test -s found.txt
